    <path d="M 70 115 L 70 85 C 69 85 68 85 68 84 C 64 80 62 72 62 65 L 62 40 M 78 40 L 78 65 C 78 72 76 80 72 84 C 72 85 71 85 70 85" fill="none" stroke="#1b3018" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
